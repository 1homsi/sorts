def countingSort(List<Integer> arr, int exp) {
    int n = arr.size()
    List<Integer> output = new ArrayList<>(Collections.nCopies(n, 0))
    int[] count = new int[10]
    arr.each { x -> count[(x / exp) % 10]++ }
    (1..9).each { i -> count[i] += count[i - 1] }
    (n - 1..0).each { i ->
        int idx = (arr[i] / exp) % 10
        output[--count[idx]] = arr[i]
    }
    (0..<n).each { i -> arr[i] = output[i] }
}

def radixSort(List<Integer> arr) {
    if (!arr) return arr
    int max = arr.max()
    int exp = 1
    while (max / exp > 0) {
        countingSort(arr, exp)
        exp *= 10
    }
    arr
}

