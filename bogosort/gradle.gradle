def isSorted(arr) {
    for (int i = 0; i < arr.size() - 1; i++) {
        if (arr[i] > arr[i + 1]) return false
    }
    return true
}

def shuffle(arr) {
    Collections.shuffle(arr)
    arr
}

def bogosort(arr) {
    def a = new ArrayList(arr)
    while (!isSorted(a)) shuffle(a)
    a
}

task bogosortTask {
    doLast {
        def arr = [3, 1, 4, 1, 5, 9, 2, 6]
        println bogosort(arr)
    }
}
