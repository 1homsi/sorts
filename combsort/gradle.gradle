def combSort(int[] arr) {
    int n = arr.length
    int gap = n
    boolean sorted = false
    while (!sorted) {
        gap = (int)(gap / 1.3)
        if (gap <= 1) {
            gap = 1
            sorted = true
        }
        for (int i = 0; i + gap < n; i++) {
            if (arr[i] > arr[i + gap]) {
                int tmp = arr[i]
                arr[i] = arr[i + gap]
                arr[i + gap] = tmp
                sorted = false
            }
        }
    }
    arr
}

task sortDemo {
    doLast {
        def arr = [5, 3, 8, 1, 9, 2, 7, 4, 6] as int[]
        println combSort(arr)
    }
}
