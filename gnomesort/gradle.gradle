def gnomeSort(arr) {
    def i = 0
    while (i < arr.size()) {
        if (i == 0 || arr[i] >= arr[i - 1]) {
            i++
        } else {
            def tmp = arr[i]
            arr[i] = arr[i - 1]
            arr[i - 1] = tmp
            i--
        }
    }
    arr
}

task gnomeSort {
    doLast {
        def arr = [5, 3, 8, 1, 9, 2, 7, 4, 6, 0]
        println gnomeSort(arr)
    }
}
